<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Ball Style Options</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #020502;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #e2e8f0;
    padding: 20px;
  }
  h1 { color: #f59e0b; margin-bottom: 10px; }
  .sub { color: #94a3b8; margin-bottom: 30px; }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    max-width: 1400px;
  }
  .card {
    background: #0a0f0a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    width: 280px;
  }
  .card h3 { margin: 0 0 4px 0; color: #f59e0b; }
  .card .notes { font-size: 11px; color: #64748b; margin-bottom: 8px; }
  canvas { border-radius: 8px; width: 248px; height: 200px; }
  .labels { display: flex; justify-content: space-around; font-size: 11px; color: #94a3b8; margin-top: 6px; }
</style>
</head>
<body>
  <h1>■ Player Ball Styles</h1>
  <div class="sub">Runner (R) · Chaser (C) — shown on dark neon grid</div>
  <div class="gallery" id="gallery"></div>

<script>
const BALL_R = 24;
const CX = 72, CY = 95; // Runner position
const CX2 = 192, CY2 = 95; // Chaser position

function runDemo() {
  const cards = [
    { title: '① Polish (current +)', notes: 'Radial gradients, R/C labels, deeper glow' },
    { title: '② Tech Neon', notes: 'Concentric rings, scanning arc, angular glow' },
    { title: '③ Silhouette Swap', notes: 'Runner=circle, Chaser=hexagon, no text' },
    { title: '④ Material / 3D', notes: 'Specular highlight, rim light, shadow drop' },
  ];

  const gallery = document.getElementById('gallery');
  cards.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${c.title}</h3><div class="notes">${c.notes}</div><canvas id="cv${i}" width="264" height="200"></canvas><div class="labels"><span>RUNNER</span><span>CHASER</span></div>`;
    gallery.appendChild(card);
    const canvas = document.getElementById(`cv${i}`);
    draw(canvas, i);
  });
}

function draw(canvas, style) {
  const ctx = canvas.getContext('2d');

  // Dark grid background
  ctx.fillStyle = '#020502';
  ctx.fillRect(0, 0, 264, 200);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 264; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 200); ctx.stroke();
  }
  for (let y = 0; y < 200; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(264, y); ctx.stroke();
  }

  // Draw bumpers for context
  const bumpers = [
    { x: 30, y: 40 }, { x: 230, y: 165 }, { x: 200, y: 35 }, { x: 50, y: 170 }
  ];
  bumpers.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
    ctx.strokeStyle = '#ea580c';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ea580c';
    ctx.stroke();
    ctx.shadowBlur = 0;
    // cross
    ctx.beginPath();
    ctx.moveTo(b.x - 5, b.y); ctx.lineTo(b.x + 5, b.y);
    ctx.moveTo(b.x, b.y - 5); ctx.lineTo(b.x, b.y + 5);
    ctx.strokeStyle = '#ea580c';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // ── HAZARD LABELS ──
  ctx.font = '8px monospace';
  ctx.fillStyle = '#d97706';
  ctx.textAlign = 'center';
  ctx.fillText('BOUNCE', 30, 55);
  ctx.fillText('WALL', 30, 63);

  ctx.shadowBlur = 0;

  switch(style) {
    case 0: drawPolish(ctx); break;
    case 1: drawTechNeon(ctx); break;
    case 2: drawSilhouette(ctx); break;
    case 3: drawMaterial(ctx); break;
  }
}

// ─── ① POLISH (radial gradients, deeper glow, nice text) ───
function drawPolish(ctx) {
  drawOneBall(ctx, CX, CY, '#f8fafc', '#38bdf8', 'R', '#0f172a', false);
  drawOneBall(ctx, CX2, CY2, '#d97706', '#ea580c', 'C', '#ffffff', true);
}

function drawOneBall(ctx, x, y, fill, glow, letter, textColor, isChaser) {
  ctx.save();
  // Radial gradient
  const grad = ctx.createRadialGradient(x - 8, y - 8, 2, x, y, BALL_R);
  if (isChaser) {
    grad.addColorStop(0, '#fbbf24');
    grad.addColorStop(0.5, fill);
    grad.addColorStop(1, '#78350f');
  } else {
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.5, fill);
    grad.addColorStop(1, '#1e3a5f');
  }
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Outer glow
  ctx.lineWidth = 5;
  ctx.strokeStyle = glow;
  ctx.shadowBlur = 30;
  ctx.shadowColor = glow;
  ctx.stroke();

  // Second inner stroke for depth
  ctx.shadowBlur = 0;
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.stroke();

  // Text
  ctx.shadowBlur = 0;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = textColor;
  ctx.fillText(letter, x, y);

  // Turn halo
  ctx.beginPath();
  ctx.arc(x, y, BALL_R + 14, 0, Math.PI * 2);
  ctx.strokeStyle = glow;
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.stroke();

  ctx.restore();
}

// ─── ② TECH NEON (concentric rings + scanning arc) ───
function drawTechNeon(ctx) {
  // RUNNER - cool blue/cyan tones
  drawNeonBall(ctx, CX, CY, '#38bdf8', '#0ea5e9', '#f8fafc', 0);
  // CHASER - warm amber/orange
  drawNeonBall(ctx, CX2, CY2, '#f59e0b', '#ea580c', '#ffffff', 1);
}

function drawNeonBall(ctx, x, y, color, darkColor, coreColor, seed) {
  ctx.save();

  // Outer ring
  ctx.beginPath();
  ctx.arc(x, y, BALL_R + 6, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.3;
  ctx.shadowBlur = 20;
  ctx.shadowColor = color;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Main ring
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#020502';
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = color;
  ctx.shadowBlur = 25;
  ctx.shadowColor = color;
  ctx.stroke();

  // Inner ring
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(x, y, BALL_R * 0.55, 0, Math.PI * 2);
  ctx.lineWidth = 2;
  ctx.strokeStyle = coreColor;
  ctx.stroke();

  // Core dot
  ctx.beginPath();
  ctx.arc(x, y, BALL_R * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = coreColor;
  ctx.shadowBlur = 10;
  ctx.shadowColor = coreColor;
  ctx.fill();

  // Scanning arc
  ctx.shadowBlur = 0;
  const arcAngle = (Date.now() * 0.002 + seed * Math.PI) % (Math.PI * 2);
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, arcAngle - 0.4, arcAngle);
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#ffffff';
  ctx.globalAlpha = 0.6;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Letter
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = coreColor;
  ctx.fillText(seed === 0 ? 'R' : 'C', x, y);

  ctx.restore();
}

// ─── ③ SILHOUETTE SWAP ───
function drawSilhouette(ctx) {
  // RUNNER - circle with subtle tech detail
  ctx.save();
  const grad = ctx.createRadialGradient(CX - 6, CY - 6, 0, CX, CY, BALL_R);
  grad.addColorStop(0, '#bae6fd');
  grad.addColorStop(0.4, '#38bdf8');
  grad.addColorStop(1, '#0c4a6e');
  ctx.beginPath();
  ctx.arc(CX, CY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#38bdf8';
  ctx.strokeStyle = '#7dd3fc';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Ring lines inside (like a mini planet)
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  for (let r = 0.4; r < 1; r += 0.2) {
    ctx.beginPath();
    ctx.arc(CX, CY, BALL_R * r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  // CHASER - hexagon (aggressive hunter shape)
  ctx.save();
  const sides = 6;
  const hexR = BALL_R * 1.1;
  const grad2 = ctx.createRadialGradient(CX2 - 6, CY2 - 6, 0, CX2, CY2, hexR);
  grad2.addColorStop(0, '#fde68a');
  grad2.addColorStop(0.5, '#d97706');
  grad2.addColorStop(1, '#7c2d12');

  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 6;
    const hx = CX2 + Math.cos(angle) * hexR;
    const hy = CY2 + Math.sin(angle) * hexR;
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.fillStyle = grad2;
  ctx.fill();
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#d97706';
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Inner hex ring
  ctx.shadowBlur = 0;
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 6;
    const hx = CX2 + Math.cos(angle) * hexR * 0.5;
    const hy = CY2 + Math.sin(angle) * hexR * 0.5;
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

// ─── ④ MATERIAL / PHYSICAL ───
function drawMaterial(ctx) {
  ctx.save();
  // Drop shadow
  ctx.beginPath();
  ctx.ellipse(CX + 3, CY + BALL_R + 4, BALL_R * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Ball body
  const grad = ctx.createRadialGradient(CX - 8, CY - 10, 2, CX, CY, BALL_R);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, '#e0f2fe');
  grad.addColorStop(0.7, '#38bdf8');
  grad.addColorStop(1, '#1e3a5f');
  ctx.beginPath();
  ctx.arc(CX, CY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Specular highlight
  ctx.beginPath();
  ctx.ellipse(CX - 8, CY - 8, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Rim light (thin bright arc)
  ctx.beginPath();
  ctx.arc(CX, CY, BALL_R - 1, -Math.PI * 0.8, -Math.PI * 0.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Glow stroke
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#38bdf8';
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#38bdf8';
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Letter with metallic look
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#0c4a6e';
  ctx.fillText('R', CX, CY + 1);
  ctx.fillStyle = '#38bdf8';
  ctx.fillText('R', CX - 1, CY - 1);

  ctx.restore();

  // ── CHASER ──
  ctx.save();
  // Drop shadow
  ctx.beginPath();
  ctx.ellipse(CX2 + 3, CY2 + BALL_R + 4, BALL_R * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Ball body
  const grad2 = ctx.createRadialGradient(CX2 - 8, CY2 - 10, 2, CX2, CY2, BALL_R);
  grad2.addColorStop(0, '#fef3c7');
  grad2.addColorStop(0.3, '#fde68a');
  grad2.addColorStop(0.7, '#d97706');
  grad2.addColorStop(1, '#7c2d12');
  ctx.beginPath();
  ctx.arc(CX2, CY2, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad2;
  ctx.fill();

  // Specular highlight
  ctx.beginPath();
  ctx.ellipse(CX2 - 8, CY2 - 8, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  // Rim light
  ctx.beginPath();
  ctx.arc(CX2, CY2, BALL_R - 1, -Math.PI * 0.8, -Math.PI * 0.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Glow stroke
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#d97706';
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#d97706';
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Letter
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#451a03';
  ctx.fillText('C', CX2, CY2 + 1);
  ctx.fillStyle = '#fbbf24';
  ctx.fillText('C', CX2 - 1, CY2 - 1);
  ctx.restore();
}

// Animate scanning arcs
function animate() {
  const canvas0 = document.getElementById('cv1');
  if (canvas0) draw(canvas0, 1);
  requestAnimationFrame(animate);
}

runDemo();
// Only animate the tech neon style (index 1)
setInterval(() => {
  const cvs = document.querySelectorAll('canvas');
  if (cvs[1]) draw(cvs[1], 1);
}, 50);
</script>
</body>
</html>
