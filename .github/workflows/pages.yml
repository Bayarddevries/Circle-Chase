name: Deploy

on:
  push:
    branches: [main, gh-pages, 'feature/**']

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Job 1: Main branch → root of gh-pages (production)
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy build to root
        run: |
          rm -rf gh-pages/assets gh-pages/index.html
          cp -r dist/* gh-pages/

      - name: Deploy to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: main @ ${{ github.sha }}" || echo "No changes"
          git push origin gh-pages

  # Job 2: Feature branches → subdirectory on gh-pages (preview)
  deploy-preview:
    if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          BASE_PATH: '/Circle-Chase/preview/${{ github.ref_name }}/'

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy build to preview directory
        run: |
          mkdir -p gh-pages/preview/${{ github.ref_name }}
          cp -r dist/* gh-pages/preview/${{ github.ref_name }}/

      - name: Deploy preview to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "preview: ${{ github.ref_name }} @ ${{ github.sha }}" || echo "No changes"
          git push origin gh-pages
